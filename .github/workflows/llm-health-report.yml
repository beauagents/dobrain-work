name: LLM Health Report (Codex)

on:
  schedule:
    - cron: '0 9 * * 5'
  workflow_dispatch:

jobs:
  health-report:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Gather metrics
        id: metrics
        run: |
          echo "total_commits=$(git rev-list --count HEAD)" >> $GITHUB_OUTPUT
          echo "recent_commits=$(git log --oneline --since='7 days ago' | wc -l)" >> $GITHUB_OUTPUT
          echo "files_count=$(git ls-files | wc -l)" >> $GITHUB_OUTPUT
      - name: Generate health report
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          CODEX_MODEL: ${{ vars.CODEX_HEALTH_MODEL || 'gpt-4o' }}
          METRICS: |
            Total commits: ${{ steps.metrics.outputs.total_commits }}
            Commits this week: ${{ steps.metrics.outputs.recent_commits }}
            Files in repo: ${{ steps.metrics.outputs.files_count }}
        run: |
          codex --quiet --model "$CODEX_MODEL" "You are a repository health analyst. Given repo metrics, produce a concise health report with status indicators (✅ healthy, ⚠️ needs attention, ❌ critical). Suggest actionable improvements. Focus ONLY on health metrics. Repository: dobrain-work (Cloudflare Worker). Metrics: $METRICS" > /tmp/health.md 2>&1 || true
      - name: Create health issue
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = fs.readFileSync('/tmp/health.md', 'utf8');
            const date = new Date().toISOString().slice(0, 10);
            await github.rest.issues.create({owner: context.repo.owner, repo: context.repo.repo, title: '📊 Weekly Health Report - ' + date, body: '## 🤖 Health Report (OpenAI Codex)\n\n' + report, labels: ['health-report']});
