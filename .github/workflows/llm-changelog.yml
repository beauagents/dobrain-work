name: LLM Changelog (Codex)

on:
  push:
    branches:
      - main
    paths-ignore:
      - '*.md'
      - '.github/**'
  workflow_dispatch:

jobs:
  changelog:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 10
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Generate changelog
        env:
          OPENAI_OAUTH_TOKEN: ${{ secrets.OPENAI_OAUTH_TOKEN }}
          CODEX_MODEL: ${{ vars.CODEX_CHANGELOG_MODEL || 'o4-mini' }}
        run: |
          COMMITS=$(git log --oneline -10 --no-merges)
          echo "Generate a concise changelog entry from these commits. Group by type (features, fixes, maintenance). Use markdown. Focus ONLY on changelog.\n\nCommits:\n$COMMITS" | codex exec -m "$CODEX_MODEL" --sandbox read-only --dangerously-bypass-approvals-and-sandbox -o /tmp/changelog.md -
      - name: Commit changelog
        run: |
          ENTRY=$(cat /tmp/changelog.md)
          DATE=$(date +%Y-%m-%d)
          if [ -f CHANGELOG.md ]; then
            EXISTING=$(cat CHANGELOG.md)
            echo "# Changelog"$'\n\n'"## $DATE"$'\n\n'"$ENTRY"$'\n'"${EXISTING#*# Changelog}" > CHANGELOG.md
          else
            echo "# Changelog"$'\n\n'"## $DATE"$'\n\n'"$ENTRY" > CHANGELOG.md
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add CHANGELOG.md
          git diff --cached --quiet || git commit -m "docs: update changelog [skip ci]" && git push
