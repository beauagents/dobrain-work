name: Welcome Bot

on:
  issues:
    types:
      - opened
  pull_request_target:
    types:
      - opened

jobs:
  welcome:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/first-interaction@v1
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
          issue-message: >
            Thanks for opening your first issue in this project! We appreciate
            your contribution and will review it shortly.
          pr-message: >
            Thanks for opening your first pull request! We appreciate your
            contribution and will review it soon.
