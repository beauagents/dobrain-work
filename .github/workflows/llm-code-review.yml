name: LLM Code Review (Codex)

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Review code with Codex
        uses: openai/codex-action@v1
        with:
          prompt: |
            Review this PR diff for bugs, security issues, performance problems, and code quality. Be specific with line references. Focus ONLY on code review.
            
            PR Title: ${{ github.event.pull_request.title }}
            
            Diff:
            ${{ steps.diff.outputs.diff }}
          output-file: /tmp/review.md
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🤖 Code Review (OpenAI Codex)
' + review
            });
