name: LLM Code Review (Codex)

on:
  pull_request:
    types:
      - opened
      - synchronize
  workflow_dispatch:

jobs:
  review:
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Get PR diff
        id: diff
        run: |
          DIFF=$(git diff origin/main...HEAD)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Review code with Codex
        env:
          OPENAI_OAUTH_TOKEN: ${{ secrets.OPENAI_OAUTH_TOKEN }}
          CODEX_MODEL: ${{ vars.CODEX_MODEL || 'o4-mini' }}
          PR_DIFF: ${{ steps.diff.outputs.diff }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          echo "Review this PR diff for bugs, security issues, performance problems, and code quality. Be specific with line references. Focus ONLY on code review.\n\nPR Title: $PR_TITLE\n\nDiff:\n$PR_DIFF" | codex exec -m "$CODEX_MODEL" --sandbox read-only --dangerously-bypass-approvals-and-sandbox -o /tmp/review.md -
      - name: Post review comment
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const review = fs.readFileSync('/tmp/review.md', 'utf8');
            const model = '${{ vars.CODEX_MODEL }}' || 'o4-mini';
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🤖 Code Review (OpenAI Codex — ' + model + ')\n\n' + review
            });
