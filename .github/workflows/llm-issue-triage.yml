name: LLM Issue Triage (Codex)

on:
  issues:
    types:
      - opened
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Triage issue
        id: triage
        uses: openai/codex-action@v1
        with:
          prompt: |
            Classify this issue into exactly one category and suggest a priority. Respond in JSON only: {"category": "bug|feature|question|docs|maintenance", "priority": "low|medium|high|critical", "summary": "one line summary"}. Focus ONLY on triage.
            
            Title: ${{ github.event.issue.title }}
            
            Body:
            ${{ github.event.issue.body }}
          output-file: /tmp/triage.json
      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let raw = fs.readFileSync('/tmp/triage.json', 'utf8');
            raw = raw.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
            try {
              const triage = JSON.parse(raw);
              const labels = [triage.category];
              if (triage.priority === 'critical' || triage.priority === 'high') labels.push('priority:' + triage.priority);
              await github.rest.issues.addLabels({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels});
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: '## 🤖 Issue Triage (Codex)\n\n- **Category:** ' + triage.category + '\n- **Priority:** ' + triage.priority + '\n- **Summary:** ' + triage.summary});
            } catch(e) {
              console.log('Triage output:', raw);
            }
