name: LLM Issue Triage

on:
  issues:
    types:
      - opened
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - name: Triage issue
        id: triage
        env:
          OPENCODE_API_KEY: ${{ secrets.OPENCODE_API_KEY }}
          OPENCODE_MODEL: ${{ vars.OPENCODE_MODEL || 'deepseek-v4-flash' }}
          OPENCODE_BASE_URL: ${{ vars.OPENCODE_BASE_URL || 'https://api.opencode.ai' }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          node -e "
          const https = require('https');
          const url = new URL(process.env.OPENCODE_BASE_URL + '/v1/chat/completions');
          const body = JSON.stringify({
            model: process.env.OPENCODE_MODEL,
            messages: [{
              role: 'system',
              content: 'You are an issue triage bot. Classify the issue into exactly one category and suggest a priority. Respond in JSON only with this format: {\"category\": \"bug|feature|question|docs|maintenance\", \"priority\": \"low|medium|high|critical\", \"summary\": \"one line summary\"}. Focus ONLY on triage — do not review code, write docs, or generate changelogs.'
            }, {
              role: 'user',
              content: 'Title: ' + process.env.ISSUE_TITLE + '\n\nBody:\n' + (process.env.ISSUE_BODY || 'No body provided').slice(0, 4000)
            }],
            max_tokens: 300
          });
          const req = https.request(url, { method: 'POST', headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + process.env.OPENCODE_API_KEY } }, res => {
            let data = '';
            res.on('data', d => data += d);
            res.on('end', () => {
              try {
                const content = JSON.parse(data).choices[0].message.content;
                const cleaned = content.replace(/```json\n?/g, '').replace(/```\n?/g, '').trim();
                const result = JSON.parse(cleaned);
                require('fs').writeFileSync('/tmp/triage.json', JSON.stringify(result));
              } catch (e) {
                require('fs').writeFileSync('/tmp/triage.json', JSON.stringify({category: 'bug', priority: 'medium', summary: 'Auto-triage failed: ' + e.message}));
              }
            });
          });
          req.write(body);
          req.end();
          "
      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const triage = JSON.parse(fs.readFileSync('/tmp/triage.json', 'utf8'));
            const labels = [triage.category];
            if (triage.priority === 'critical' || triage.priority === 'high') {
              labels.push('priority:' + triage.priority);
            }
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              labels: labels
            });
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: '## 🤖 Issue Triage (deepseek-v4-flash)\n\n' +
                    '- **Category:** ' + triage.category + '\n' +
                    '- **Priority:** ' + triage.priority + '\n' +
                    '- **Summary:** ' + triage.summary
            });
