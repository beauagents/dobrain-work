name: LLM Issue Triage (Codex)

on:
  issues:
    types:
      - opened
  workflow_dispatch:

jobs:
  triage:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install Codex CLI
        run: npm install -g @openai/codex
      - name: Triage issue
        id: triage
        env:
          OPENAI_OAUTH_TOKEN: ${{ secrets.OPENAI_OAUTH_TOKEN }}
          CODEX_MODEL: ${{ vars.CODEX_TRIAGE_MODEL || 'o4-mini' }}
          ISSUE_TITLE: ${{ github.event.issue.title }}
          ISSUE_BODY: ${{ github.event.issue.body }}
        run: |
          echo "Classify this issue into exactly one category and suggest a priority. Respond in JSON only: {category, priority, summary}. Focus ONLY on triage.\n\nTitle: $ISSUE_TITLE\n\nBody: $ISSUE_BODY" | codex exec -m "$CODEX_MODEL" --sandbox read-only --dangerously-bypass-approvals-and-sandbox -o /tmp/triage.json -
      - name: Apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let raw = fs.readFileSync('/tmp/triage.json', 'utf8');
            raw = raw.replace(/\`\`\`json/g, '').replace(/\`\`\`/g, '').trim();
            try {
              const triage = JSON.parse(raw);
              const labels = [triage.category];
              if (triage.priority === 'critical' || triage.priority === 'high') labels.push('priority:' + triage.priority);
              await github.rest.issues.addLabels({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, labels});
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body: '## 🤖 Issue Triage (OpenAI Codex)\n\n- **Category:** ' + triage.category + '\n- **Priority:** ' + triage.priority + '\n- **Summary:** ' + triage.summary});
            } catch(e) {
              console.log('Triage output:', raw);
            }
