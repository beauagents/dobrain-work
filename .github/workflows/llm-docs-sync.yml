name: LLM Docs Sync (Codex)

on:
  pull_request:
    types:
      - opened
      - synchronize
    paths:
      - 'src/**'
      - 'wrangler.toml'
      - 'package.json'
  workflow_dispatch:

jobs:
  docs-sync:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Get diff and README
        id: context
        run: |
          DIFF=$(git diff origin/main...HEAD -- src/ wrangler.toml package.json)
          echo "diff<<EOF" >> $GITHUB_OUTPUT
          echo "$DIFF" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
      - name: Check docs alignment
        uses: openai/codex-action@v1
        with:
          prompt: |
            Compare code changes with the README and identify documentation that needs updating. Respond in JSON: {"in_sync": true/false, "missing_updates": ["list"]}. Focus ONLY on docs/code alignment.
            
            Code diff:
            ${{ steps.context.outputs.diff }}
            
            README:
            ${{ steps.context.outputs.readme }}
          output-file: /tmp/docs-check.json
      - name: Report docs status
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            let raw = fs.readFileSync('/tmp/docs-check.json', 'utf8');
            raw = raw.replace(/```json/g, '').replace(/```/g, '').trim();
            const check = JSON.parse(raw);
            if (!check.in_sync && check.missing_updates?.length > 0) {
              let body = '## 🤖 Docs Sync (OpenAI Codex)\n\n⚠️ **Documentation may be out of sync.**\n\n### Missing updates:\n';
              for (const item of check.missing_updates) body += '- ' + item + '\n';
              await github.rest.issues.createComment({owner: context.repo.owner, repo: context.repo.repo, issue_number: context.issue.number, body});
            }
