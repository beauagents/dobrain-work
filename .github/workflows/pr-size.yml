name: PR Size Labeler

on:
  pull_request:
    types:
      - opened
      - synchronize

jobs:
  size-label:
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: codelytv/pr-size-labeler@v1
        with:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          xs_max_size: 10
          s_max_size: 50
          m_max_size: 200
          l_max_size: 500
          fail_if_xl: false
          message_if_xl: >
            This PR is quite large. Consider breaking it into smaller changes.
          files_to_ignore: |
            package-lock.json
            *.md
